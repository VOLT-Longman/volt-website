<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - VOLT Fleet</title>
  <link rel="icon" type="image/png" href="assets/images/VOLT_logo.png">
  <style>
    :root {
      --volt-orange: #E8482F;
      --font: -apple-system, BlinkMacSystemFont, "Pretendard", sans-serif;
      --mono: "SF Mono", "Menlo", monospace;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: var(--font);
      background: #000; color: #f5f5f7;
      min-height: 100vh; display: flex;
      align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .container { max-width: 560px; }
    .logo { width: 100px; margin-bottom: 24px; filter: drop-shadow(0 0 30px rgba(232,72,47,0.4)); }
    .code {
      font-family: var(--mono); font-size: 96px; font-weight: 800;
      color: var(--volt-orange); line-height: 1;
      letter-spacing: -4px; margin-bottom: 16px;
    }
    .doc-tag {
      display: inline-block; font-family: var(--mono); font-size: 11px;
      color: var(--volt-orange); background: rgba(232,72,47,0.1);
      border: 1px solid rgba(232,72,47,0.3); padding: 4px 12px;
      border-radius: 4px; letter-spacing: 0.1em; margin-bottom: 24px;
    }
    h1 { font-size: 28px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
    p { font-size: 16px; color: #a1a1a6; line-height: 1.7; margin-bottom: 40px; }
    .btn {
      display: inline-block; padding: 14px 36px;
      background: var(--volt-orange); color: #fff;
      border-radius: 980px; text-decoration: none;
      font-size: 16px; font-weight: 600;
      transition: all 0.3s; box-shadow: 0 4px 20px rgba(232,72,47,0.3);
    }
    .btn:hover { background: #FF5F44; transform: translateY(-2px); box-shadow: 0 6px 24px rgba(232,72,47,0.45); }
    .grid-bg {
      position: fixed; inset: 0; pointer-events: none; z-index: -1;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse at center, black 20%, transparent 70%);
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="container">
    <img src="assets/images/VOLT_logo.png" class="logo" alt="VOLT" onerror="this.style.display='none'">
    <div class="code">404</div>
    <div class="doc-tag">VOLT-ERROR / PAGE_NOT_FOUND</div>
    <h1>항법 오류 — 좌표를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.<br>함대 본부로 귀환하여 경로를 다시 설정하세요.</p>
    <a href="/" class="btn">함대 본부로 귀환</a>
  </div>
</body>
</html>
